<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mediaqueries.css">
</head>
<body>
    <nav id="desktop-nav">
        <div class="logo">ANTONY AAKASH S</div>
        <div>
            <ul class="nav-links">
                <li><a href="#about">About</a></li>
                <li><a href="#experience">Experience</a></li>
                <li><a href="#project">Projects</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </div>
    </nav>
    <nav id="hamburger-nav">
        <div class="logo">ANTONY AAKASH S</div>
        <div class="hamburger-menu">
            <div class="hamburger-icon" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="menu-links">
                <li><a href="#about" onclick="toggleMenu()">About</a></li>
                <li><a href="#experience" onclick="toggleMenu()">Experience</a></li>
                <li><a href="#project" onclick="toggleMenu()">Projects</a></li>
                <li><a href="#contact" onclick="toggleMenu()">Contact</a></li>
            </div>
        </div>
    </nav>
    <div id="section-profile"></div>
    <div id="section-about"></div>
    <div id="section-experience"></div>
    <div id="section-project"></div>
    <div id="section-contact"></div>
    <footer>
        <nav>
            <div class="nav-links-container">
                <ul class="nav-links">
                    <li><a href="#about">About</a></li>
                    <li><a href="#experience">Experience</a></li>
                    <li><a href="#project">Projects</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </div>
        </nav>
        <p>© 2025 Antony Aakash S. All rights reserved.</p>
    </footer>


    <div id="chat-widget" class="chat-widget" aria-live="polite">
        <button id="chat-toggle" class="chat-toggle" aria-haspopup="dialog" aria-controls="chat-popup" aria-expanded="false" title="Chat with me">
            <span class="chat-toggle-emoji" aria-hidden="true">🤖</span>
            <span class="sr-only">Open chat</span>
        </button>
        <div id="chat-popup" class="chat-popup" role="dialog" aria-label="AI Chatbot" aria-modal="false">
            <div class="chat-popup-header">
                <div class="chat-popup-title">AI Assistant</div>
                <button id="chat-close" class="chat-close" aria-label="Close chat">×</button>
            </div>
            <iframe
                id="chat-iframe"
                title="AI Chatbot"
                data-src="http://127.0.0.1:5000/"
                loading="lazy"
                referrerpolicy="no-referrer"
                allow="clipboard-write"
            ></iframe>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
